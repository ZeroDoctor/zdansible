---

- name: Detect SSH port
  import_playbook: ../basebook/detect-port.yaml

- name: Initialize vdune config
  hosts: vdune
  become: true
  become_user: root

  vars_files:
    - ../vars/vars.yaml
    - ../vars/vars.secrets.yaml

  tasks:
    - name: Install nfs
      ansible.builtin.apt:
        name:
          - nfs-kernel-server
        state: present

    - name: Make seaweedfs master directory
      ansible.builtin.file:
        path: /mnt/local/seaweedfs/master
        state: directory
        mode: '0755'

    - name: Make seaweedfs volume directory
      ansible.builtin.file:
        path: /mnt/local/seaweedfs/volume
        state: directory
        mode: '0755'

    - name: Create vdrive folder
      ansible.builtin.file:
        path: /mnt/vdrive
        state: directory
        mode: '0755'

    - name: Create ddune group
      ansible.builtin.group:
        name: ddune
        gid: 8000
        state: present

    - name: Create ddune user
      ansible.builtin.user:
        name: ddune
        password: "{{ user_pw | password_hash('sha512') }}"
        group: ddune
        create_home: false
        shell: /usr/sbin/nologin
        uid: 8000
        state: present

    - name: Append ddune group to vdune user
      ansible.builtin.user:
        name: vdune
        groups:
          - ddune
        append: true

    - name: Restart nfs service
      ansible.builtin.systemd:
        name: nfs-server
        enabled: true
        state: restarted

    - name: Copy nfs exports config
      ansible.builtin.copy:
        src: ../data/exports
        dest: /etc/exports
        mode: '0644'

    - name: Reload nfs exports
      register: exports
      changed_when: exports.rc == 0
      args:
        executable: /bin/bash
      ansible.builtin.shell: sudo exportfs -arv

    - name: Create grafana volume
      ansible.builtin.file:
        path: /mnt/local/grafana
        state: directory
        mode: '0755'

    - name: Create loki volume
      ansible.builtin.file:
        path: /mnt/local/loki
        state: directory
        mode: '0755'
