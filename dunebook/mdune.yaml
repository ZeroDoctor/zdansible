---

- name: Detect SSH port
  import_playbook: ../basebook/detect-port.yaml

- name: Creating mdune config
  hosts: mdune
  become: true
  become_user: root

  vars_files:
    - ../vars/vars.yaml
    - ../vars/vars.secrets.yaml

  tasks:
    - name: Install nomad scripts
      become: true
      become_user: "{{ hostvars[inventory_hostname].user }}"
      args:
        executable: /bin/bash
      ansible.builtin.shell: |
        (git clone https://{{ git_user }}:{{ git_org_token }}@github.com/zerodoc-s-stack/zdnomad || true) && \
        pushd zdnomad && \
        git pull origin main && \
        popd
      register: nomad_scripts
      changed_when: nomad_scripts.rc == 0

    - name: Install database migration tool
      become: true
      become_user: "{{ hostvars[inventory_hostname].user }}"
      args:
        executable: /bin/bash
      ansible.builtin.shell: |
        (git clone https://{{ git_user }}:{{ git_org_token }}@github.com/zerodoc-s-stack/zdmigration || true) && \
        pushd zdmigration && \
        git pull origin main && \
        popd
      register: migration_tool
      changed_when: migration_tool.rc == 0

    - name: Enable and persist ip forwarding
      ansible.posix.sysctl:
        name: net.ipv4.ip_forward
        value: "1"
        state: present
        sysctl_set: true
        reload: true

    - name: Get wg network info
      ansible.builtin.command: ip -4 addr show dune
      register: wg_net_info
      changed_when: wg_net_info.rc == 0

    - name: Parse wg ip from network info
      ansible.builtin.command:
        cmd: grep -oP '(?<=inet\s)\d+(\.\d+){3}'
        stdin: "{{ wg_net_info.stdout }}"
      register: wg_ip_address
      changed_when: wg_ip_address.rc == 0

    - name: Set local network ip address
      ansible.builtin.set_fact:
        wg_ip: "{{ wg_ip_address.stdout }}"

    - name: Create vault group
      ansible.builtin.group:
        name: vault
        state: present

    - name: Create vault user
      ansible.builtin.user:
        name: vault
        groups: "vault"
        shell: /bin/bash
        create_home: false
        state: present

    - name: Install hashicorp vault
      ansible.builtin.apt:
        name:
          - vault
        state: present
      when: ansible_facts['lsb']['release'] == "23.10" or ansible_facts['lsb']['release'] == "22.04"

    - name: Check vault exists
      ansible.builtin.stat:
        path: /usr/bin/vault
      register: vault_check

    - name: Download and Install vault
      ansible.builtin.unarchive:
        src: https://releases.hashicorp.com/vault/1.16.2/vault_1.16.2_linux_arm64.zip
        dest: /usr/bin
        remote_src: true
      when: ansible_facts['lsb']['release'] == "24.04" and ansible_facts['architecture'] == "aarch64" and not vault_check.stat.exists

    - name: Add vault service
      ansible.builtin.copy:
        src: ../data/vault.service
        dest: /etc/systemd/system/vault.service
        mode: '0644'

    - name: Creates vault directory
      ansible.builtin.file:
        path: /etc/vault.d
        state: directory
        owner: vault
        group: vault
        mode: '0755'

    - name: Create vault server config
      ansible.builtin.template:
        dest: /etc/vault.d/vault.hcl
        src: vault-server.hcl.j2
        owner: vault
        group: vault
        mode: '0644'

    - name: Enable vault on boot
      ansible.builtin.systemd:
        name: vault
        enabled: true
        daemon_reload: true

    - name: Upload service file
      ansible.builtin.copy:
        src: ../data/consul.service
        dest: /lib/systemd/system/consul.service
        owner: root
        group: root
        mode: '0644'

    - name: Create consul server config
      ansible.builtin.template:
        dest: /etc/consul.d/consul.hcl
        src: consul-server.hcl.j2
        owner: root
        group: root
        mode: '0644'
      notify: Restart consul

    - name: Start consul and enable on boot
      ansible.builtin.systemd:
        name: consul
        enabled: true
        state: started

    - name: Create nomad server config
      ansible.builtin.template:
        dest: /etc/nomad.d/nomad.hcl
        src: nomad-server.hcl.j2
        owner: root
        group: root
        mode: '0644'
      notify: Restart nomad

    - name: Start nomad and enable on boot
      ansible.builtin.systemd:
        name: nomad
        enabled: true
        state: started

    - name: Update resolved with wg ip
      ansible.builtin.template:
        dest: /etc/resolv.conf
        src: resolv.conf.j2
        owner: root
        group: root
        mode: '0644'

    - name: Create drone volume folder
      ansible.builtin.file:
        path: /mnt/local/drone
        state: directory
        mode: '0755'

    - name: Install dnsmasq
      ansible.builtin.apt:
        name:
          - dnsmasq
        state: present

    - name: Add dnsmasq consul config
      ansible.builtin.template:
        dest: /etc/dnsmasq.d/10-consul.conf
        src: 10-consul.conf.j2
        owner: root
        group: root
        mode: '0644'

    - name: Stop systemd-resovled
      ansible.builtin.systemd:
        name: systemd-resolved
        enabled: false
        state: stopped

    - name: Start dnsmasq service
      ansible.builtin.systemd:
        name: dnsmasq
        enabled: true
        state: started

  handlers:
    - name: Restart consul
      ansible.builtin.systemd:
        name: consul
        state: restarted

    - name: Restart nomad
      ansible.builtin.systemd:
        name: nomad
        state: restarted
