- name: Allow WireGuard port for mobile hosts
  hosts: net_mobile
  become: true
  become_user: root

  tasks:
    - name: UFW allow WireGuard inbound
      community.general.ufw:
        rule: allow
        direction: in
        port: '51820'
        proto: udp

    - name: UFW allow WireGuard outbound
      community.general.ufw:
        rule: allow
        direction: out
        port: '51820'
        proto: udp

- name: Configure bash for dune hosts
  hosts: clients
  become: true
  become_user: root

  vars_files:
    - ../vars/vars.yaml
    - ../vars/vars.secrets.yaml

  tasks:
    - name: Install oh-my-bash
      args:
        executable: /bin/bash
      ansible.builtin.shell: |
        (sudo rm -r /usr/local/share/oh-my-bash || true) && \
        sudo bash -c "$(sudo curl -fsSL https://raw.githubusercontent.com/ohmybash/oh-my-bash/master/tools/install.sh)" --prefix=/usr/local
      register: podman_output
      changed_when: podman_output.rc == 0

    - name: Add dune bashrc
      ansible.builtin.copy:
        src: ../data/.dune.bashrc
        dest: /home/{{ hostvars[inventory_hostname].user }}/.bashrc
        mode: '0644'

    - name: Add root bashrc
      ansible.builtin.copy:
        src: ../data/.root.bashrc
        dest: /root/.bashrc
        mode: '0644'
