---

- name: Detect SSH port
  import_playbook: detect-port.yaml

- name: Allow ip addresses for houston
  hosts: net_houston
  become: true
  become_user: root

  tasks:
    - name: UFW allow from local to houston outgoing ip
      become: true
      community.general.ufw:
        rule: allow
        direction: out
        from_ip: "{{ hostvars[inventory_hostname].inventory_hostname }}"
        to_ip: "{{ item }}"
      loop: "{{ groups['net_houston'] }}"

    - name: UFW allow from houston to local outgoing ip
      become: true
      community.general.ufw:
        rule: allow
        direction: out
        from_ip: "{{ item }}"
        to_ip: "{{ hostvars[inventory_hostname].inventory_hostname }}"
      loop: "{{ groups['net_houston'] }}"

    - name: UFW allow from houston to longview outgoing ip
      become: true
      community.general.ufw:
        rule: allow
        direction: out
        from_ip: "{{ hostvars[inventory_hostname].inventory_hostname }}"
        to_ip: "{{ hostvars[item].ip }}"
      loop: "{{ groups['net_longview'] }}"

    - name: UFW allow from longview to houston outgoing ip
      become: true
      community.general.ufw:
        rule: allow
        direction: out
        from_ip: "{{ hostvars[item].ip }}"
        to_ip: "{{ hostvars[inventory_hostname].inventory_hostname }}"
      loop: "{{ groups['net_longview'] }}"

    - name: UFW allow from houston to linode outgoing ip
      become: true
      community.general.ufw:
        rule: allow
        direction: out
        from_ip: "{{ hostvars[inventory_hostname].inventory_hostname }}"
        to_ip: "{{ hostvars[item].ip }}"
      loop: "{{ groups['net_vps'] }}"

    - name: UFW allow from linode to houston outgoing ip
      become: true
      community.general.ufw:
        rule: allow
        direction: out
        from_ip: "{{ hostvars[item].ip }}"
        to_ip: "{{ hostvars[inventory_hostname].inventory_hostname }}"
      loop: "{{ groups['net_vps'] }}"

