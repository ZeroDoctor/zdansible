---

- name: Detect SSH port
  import_playbook: ../detect-port.yaml

- name: Initialize wg spokes
  import_playbook: setup.yaml

- name: Create wg hub
  hosts: mdune
  become: true
  become_user: root

  vars_files:
    - ../../vars/vars.yaml
    - ../../vars/vars.secrets.yaml

  tasks:
    - name: Create hub wireguard config
      ansible.builtin.template:
        dest: /etc/wireguard/dune.conf
        src: dune.conf.j2
        owner: root
        group: root
        mode: '0600'
      notify: Reload wireguard config
      no_log: true

    - name: Enable wireguard on boot
      ansible.builtin.systemd:
        name: wg-quick@dune
        enabled: true

    - name: Check if wireguard interface exists
      ansible.builtin.command: ip link show dune
      register: wg_iface_check
      changed_when: false
      failed_when: false

    - name: Start or restart wireguard
      ansible.builtin.systemd:
        name: wg-quick@dune
        state: "{{ 'restarted' if wg_iface_check.rc != 0 else 'started' }}"

    - name: Verify hub wireguard interface is up
      ansible.builtin.command: wg show dune
      register: wg_hub_status
      changed_when: false
      retries: 5
      delay: 3
      until: wg_hub_status.rc == 0

  handlers:
    - name: Reload wireguard config
      ansible.builtin.shell: wg syncconf dune <(wg-quick strip dune)
      register: wg_output
      changed_when: wg_output.rc == 0
      args:
        executable: /bin/bash
