- name: Configure mail settings
  become: true
  ansible.builtin.blockinfile:
    path: /etc/msmtprc
    block: |
      defaults
      port {{ mail_port }}
      tls on
      tls_trust_file /etc/ssl/certs/ca-certificates.crt
      account {{ mail_from }}
      host {{ mail_smtp_server }}
      set_from_header on
      from {{ mail_from }}
      auth on
      user {{ mail_from }}
      password {{ mail_pw }}
      account default: {{ mail_from }}
      aliases /etc/aliases
      logfile /var/log/msmtp
    mode: '0644'
    create: true

- name: Chmod mail config file
  become: true
  ansible.builtin.file:
    path: /etc/msmtprc
    group: msmtp
    mode: '0640'

- name: Configure mail settings pt. 2
  become: true
  ansible.builtin.lineinfile:
    dest: /etc/aliases
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    mode: '0644'
    create: true
  loop:
    - { regexp: '^root:', line: 'root: {{ mail_to }}' }
    - { regexp: '^default:', line: 'default: {{ mail_to }}' }

- name: Configure mail settings pt. 3
  become: true
  ansible.builtin.lineinfile:
    path: /etc/mail.rc
    regexp: '^set sendmail'
    line: 'set sendmail="/usr/bin/msmtp -t"'
    mode: '0644'
    create: true
