- name: Update psad signatures
  become: true
  register: psad_output
  changed_when: psad_output.rc == 0
  ansible.builtin.shell: |
    psad --sig-update

- name: Configure fail2ban
  become: true
  ansible.builtin.blockinfile:
    path: /etc/fail2ban/jail.local
    block: |
      [DEFAULT]
      # the IP address range we want to ignore
      ignoreip = 127.0.0.1/8

      # who to send e-mail to
      destemail = {{ mail_to }}

      # who is the email from
      sender = {{ mail_from }}

      # since we're using exim4 to send emails
      mta = mail

      # get email alerts
      action = %(action_mwl)s
    mode: '0644'
    create: true
  notify: Restart fail2ban service

- name: Fail2ban - configure ssh jail
  become: true
  ansible.builtin.blockinfile:
    path: /etc/fail2ban/jail.d/ssh.localk
    block: |
      [sshd]
      enabled = true
      banaction = ufw
      port = {{ ssh_port }}
      filter = sshd
      logpath = %(sshd_log)s
      maxretry = 5
    mode: '0644'
    create: true
  notify: Restart fail2ban service
