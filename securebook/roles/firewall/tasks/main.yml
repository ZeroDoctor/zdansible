- name: Reset config for ufw
  become: true
  community.general.ufw:
    state: reset
    logging: true

- name: Ufw - default deny in
  become: true
  community.general.ufw:
    policy: deny
    direction: incoming

- name: Ufw - default deny out
  become: true
  community.general.ufw:
    policy: deny
    direction: outgoing

- name: Ufw - configure ssh rule
  become: true
  community.general.ufw:
    rule: limit
    direction: in
    to_port: "{{ ssh_port }}"

- name: Ufw - allow routing to wg ip
  become: true
  register: ufw_route
  args:
    executable: /bin/bash
  ansible.builtin.shell: |
    sudo ufw route allow proto tcp from 10.0.1.0/24 to 10.88.0.0/16
    sudo ufw route allow proto tcp from 10.0.0.0/24 to 10.88.0.0/16
    sudo ufw route allow proto udp from 10.0.1.0/24 to 10.88.0.0/16
    sudo ufw route allow proto udp from 10.0.0.0/24 to 10.88.0.0/16
  changed_when: ufw_route.rc == 0

- name: Ufw - allow outgoing test wg ip
  become: true
  community.general.ufw:
    rule: allow
    direction: out
    from_ip: "10.0.1.0/24"
    to_ip: "10.0.1.0/24"

- name: Ufw - allow incoming test wg ip
  become: true
  community.general.ufw:
    rule: allow
    direction: in
    from_ip: "10.0.1.0/24"
    to_ip: "10.0.1.0/24"

- name: Ufw - allow outgoing wg ip
  become: true
  community.general.ufw:
    rule: allow
    direction: out
    from_ip: "10.0.0.1/24"
    to_ip: "10.0.0.1/24"

- name: Ufw - allow incoming wg ip
  become: true
  community.general.ufw:
    rule: allow
    direction: in
    from_ip: "10.0.0.1/24"
    to_ip: "10.0.0.1/24"

- name: Ufw - allow outgoing ports
  become: true
  community.general.ufw:
    rule: allow
    direction: out
    to_port: "{{ item }}"
  with_items:
    - "53"
    - "123"
    - "80"
    - "443"
    - "51820"
    - "{{ mail_port }}"

- name: Ufw - allow in ports
  become: true
  community.general.ufw:
    rule: allow
    direction: in
    to_port: "{{ item }}"
  with_items:
    - "53"
    - "123"
    - "80"
    - "443"
    - "51820"
    - "{{ mail_port }}"

- name: Configure psad
  become: true
  ansible.builtin.lineinfile:
    create: true
    mode: '0644'
    dest: /etc/psad/psad.conf
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
  loop:
    - { regexp: '^EMAIL_ADDRESSES', line: 'EMAIL_ADDRESSES {{ mail_to }};' }
    - { regexp: '^EXPECT_TCP_OPTIONS', line: 'EXPECT_TCP_OPTIONS Y;'}
    - { regexp: '^ENABLE_PSADWATCHD', line: 'ENABLE_PSADWATCHD Y;'}
    - { regexp: '^ENABLE_AUTO_IDS ', line: 'ENABLE_AUTO_IDS Y;'}
    - { regexp: '^ENABLE_AUTO_IDS_EMAILS', line: 'ENABLE_AUTO_IDS_EMAILS N;'}
    - { regexp: '^AUTO_IDS_DANGER_LEVEL', line: 'AUTO_IDS_DANGER_LEVEL 3;'}
    - { regexp: '^HOSTNAME', line: 'HOSTNAME {{ ansible_hostname }};'}
    - { regexp: '^HOME_NET', line: 'HOME_NET {{ home_net }};'}
    - { regexp: '^ALERTING_METHODS', line: 'ALERTING_METHODS noemail;'}
    - { regexp: '^ENABLE_SYSLOG_FILE', line: 'ENABLE_SYSLOG_FILE Y;'}
    - { regexp: '^SYSLOG_DAEMON', line: 'SYSLOG_DAEMON rsyslogd;'}

- name: Ignore local net for psad
  become: true
  ansible.builtin.blockinfile:
    create: true
    mode: '0644'
    dest: /etc/psad/auto_dl
    block: |
      {{ home_net }} 0;
      127.0.0.0/8 0;
      10.0.0.1/24 0;
      10.0.1.0/24 0;
      1.0.0.0/9 0;
      8.0.0.0/9 0;
      224.0.0.1/32 0;
  notify: Restart psad service

- name: Add logging to ufw before.rules
  become: true
  ansible.builtin.blockinfile:
    dest: /etc/ufw/before.rules
    insertbefore: "COMMIT"
    marker: "# {mark} ANSIBLE MANAGED BLOCK"
    create: true
    mode: '0644'
    block: |
      # log all traffic so psad can analyze
      -A INPUT -j LOG --log-tcp-options --log-prefix "[IPTABLES] "
      -A FORWARD -j LOG --log-tcp-options --log-prefix "[IPTABLES] "

- name: Add logging to ufw before6.rules
  become: true
  ansible.builtin.blockinfile:
    dest: /etc/ufw/before6.rules
    insertbefore: "COMMIT"
    marker: "# {mark} ANSIBLE MANAGED BLOCK"
    create: true
    mode: '0644'
    block: |
      # log all traffic so psad can analyze
      -A INPUT -j LOG --log-tcp-options --log-prefix "[IPTABLES] "
      -A FORWARD -j LOG --log-tcp-options --log-prefix "[IPTABLES] "

- name: Enable config for ufw
  become: true
  community.general.ufw:
    state: enabled
    logging: true
